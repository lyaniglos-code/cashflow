# Render Blueprint — one web service that runs Express AND serves the built
# React SPA, with a persistent disk for the SQLite database.
# Create it in the Render dashboard via:  New → Blueprint → pick this repo.
services:
  - type: web
    name: cashflow
    runtime: node
    plan: starter # Starter ($7/mo) — required for the persistent disk + always-on process
    region: oregon # change if you prefer (frankfurt, singapore, ohio, virginia, …)
    healthCheckPath: /api/health
    autoDeploy: true

    # Lean build: install server (prod) deps, client deps WITH devDeps (Vite et al
    # are needed to build), then build the SPA → client/dist. Skipping the root
    # install avoids pulling the dev/QA tooling onto the server.
    buildCommand: npm install --prefix server && npm install --prefix client --include=dev && npm run build --prefix client
    startCommand: node server/src/index.js

    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/app.db # SQLite lives on the persistent disk so data survives deploys
      # Demo account: leave unset for a clean customer instance. Set to "true" in
      # the dashboard to seed demo@bistro.com / demo1234 for evaluating the app.
      - key: DEMO_MODE
        sync: false
      # Secrets auto-generated by Render — strong values, nothing to paste:
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      # Public base URL used in SMS deep links — set to your domain after it's attached
      # (e.g. https://app.example.com). Defaults are fine until then.
      - key: APP_URL
        sync: false
      # Optional integrations — leave blank to run in fallback/simulation mode,
      # or paste real keys in the dashboard (they are NOT stored in this file):
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        value: sandbox
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
